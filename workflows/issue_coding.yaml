event_type: issue_coding

steps:
  # Phase 1: Worker implements code from the issue description.
  # Generates a coding plan, runs tests in DevEnv, opens a PR on success.
  - phase: implement
    slots: 1
    prompt_path: prompts/coding/implement.md
    action: coding_session
    gate: false

  # Phase 2: Two workers review the PR from complementary angles.
  # After review, check_review_result decides:
  #   LGTM / warnings only → approve PR → advance to pm_decision
  #   Blocking issues + rounds remaining → advance to fix_iteration
  #   Blocking issues + rounds exhausted → escalate (terminate workflow)
  - phase: code_review
    slots: 2
    prompt_path: prompts/coding/code_review.md
    output_per_role: true
    action: check_review_result
    gate: false

  # Phase 3: Worker fixes blocking issues found in code_review.
  # Pushes new commits to the existing PR branch and re-runs tests.
  # On test pass → back to code_review; on failure → escalate.
  - phase: fix_iteration
    slots: 1
    prompt_path: prompts/coding/fix_iteration.md
    action: fix_coding_session
    gate: false

  # Phase 4: Worker resolves pure merge conflicts after main moves ahead.
  # Pushes a conflict-resolving commit to the existing PR branch, reruns tests,
  # then returns to code_review on success.
  - phase: merge_conflict_resolution
    slots: 1
    prompt_path: prompts/coding/merge_conflict_resolution.md
    action: fix_coding_session
    gate: false

  # Phase 5: PM records the final deterministic merge / reopen decision.
  - phase: pm_decision
    roles: [pm]
    prompt_path: prompts/coding/pm_decision.md
    action: merge_or_reopen
    gate: false
